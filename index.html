<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | Corporate Identity</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #555555;
            --accent: #c5a059;
            --bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: "Times New Roman", Times, serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .sans-font {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: left;
        }

        .logo-text {
            font-family: -apple-system, sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 4rem;
            border-left: 3px solid var(--primary);
            padding-left: 15px;
        }

        h1 {
            font-size: 2.5rem;
            line-height: 1.1;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .description {
            font-family: -apple-system, sans-serif;
            font-size: 1.05rem;
            color: var(--secondary);
            max-width: 500px;
            margin-bottom: 3.5rem;
            line-height: 1.8;
        }

        .support-section {
            font-family: -apple-system, sans-serif;
            border-top: 1px solid #e0e0e0;
            padding-top: 2rem;
        }

        .support-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--secondary);
            display: block;
            margin-bottom: 0.5rem;
        }

        .support-email {
            font-size: 1.1rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .support-email:hover {
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .container { text-align: center; }
            .logo-text { border-left: none; padding-left: 0; }
            .description { margin: 0 auto 3rem auto; }
        }

        @media (min-width: 1024px) {
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-text">SeeSip</div>
        
        <h1>Expanding our digital infrastructure.</h1>
        
        <p class="description">
            Our full corporate suite is currently under development to better serve our clients and partners. We are committed to delivering a comprehensive experience shortly.
        </p>

        <div class="support-section">
            <span class="support-label">Direct Inquiries & Support</span>
            <a href="mailto:support@seesip.in" class="support-email">support@seesip.in</a>
        </div>
    </div>

</body>
</html>
